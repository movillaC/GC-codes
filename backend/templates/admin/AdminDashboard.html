<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0f2f5; --surface: #ffffff; --border: #e2e5ea;
    --text-primary: #1a1d23; --text-secondary: #5a6075;
    --red: #dc2626; --red-hover: #b91c1c; --red-light: #fee2e2;
    --radius: 12px; --shadow: 0 1px 4px rgba(0,0,0,0.07);
    --sidebar-width: 240px;
  }
  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); }
  .layout { display: flex; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar-width); background: var(--red); display: flex; flex-direction: column; padding: 32px 0 24px; position: fixed; top: 0; left: 0; height: 100vh; z-index: 10; }
  .sidebar-logo { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 0 20px 28px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 16px; }
  .sidebar-logo span { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: 0.04em; }
  .sidebar-logo small { font-size: 12px; color: rgba(255,255,255,0.6); }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.85); text-decoration: none; transition: background 0.15s, color 0.15s; border-left: 3px solid transparent; }
  .nav-item:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .nav-item.active { background: rgba(255,255,255,0.2); color: #fff; border-left-color: #fff; }
  .nav-section-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.1em; padding: 16px 24px 6px; }
  .sidebar-bottom { margin-top: auto; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 8px; }
  .logout-btn { display: flex; align-items: center; font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.85); cursor: pointer; background: none; border: none; padding: 12px 24px; transition: color 0.15s, background 0.15s; width: 100%; font-family: 'DM Sans', sans-serif; border-left: 3px solid transparent; }
  .logout-btn:hover { color: #fff; background: rgba(255,255,255,0.15); }

  /* MAIN */
  .main { margin-left: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
  .page-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }

  /* DASHBOARD CARD */
  .dashboard { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 48px 52px; width: 100%; max-width: 660px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
  .watermark { position: absolute; top: -30px; right: -30px; opacity: 0.1; pointer-events: none; z-index: 0; }
  .watermark svg { width: 220px; height: 220px; }
  .content-inner { position: relative; z-index: 1; }

  .page-title { font-size: 20px; font-weight: 600; color: var(--text-primary); margin-bottom: 28px; }

  /* BIG STAT CARDS */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .stat-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 36px 32px; display: flex; flex-direction: column; gap: 10px; }
  .stat-card .label { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.08em; }
  .stat-card .value { font-size: 52px; font-weight: 600; color: var(--text-primary); line-height: 1; }
  .stat-card .sub { font-size: 13px; color: var(--text-secondary); }
  .stat-card.alert .value { color: var(--red); }
</style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <span>GCSW</span>
      <small>Admin Portal</small>
    </div>
    <a class="nav-item active" href="/dashboard">Dashboard</a>
    <div class="nav-section-label">Management</div>
    <a class="nav-item" href="/users">User Management</a>
    <a class="nav-item" href="/audit-logs">Audit Logs</a>
    <a class="nav-item" href="/system-config">System Config</a>
    <a class="nav-item" href="/backup">Data Backup</a>
    <div class="sidebar-bottom">
      <a class="nav-item" href="/about">About Us</a>
      <a class="nav-item" href="/contacts">Contacts</a>
      <button class="logout-btn" id="logoutBtn">Log out</button>
    </div>
  </aside>

  <div class="main">
    <div class="page-content">
      <div class="dashboard">

        <div class="watermark">
          <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <circle cx="100" cy="100" r="95" fill="none" stroke="#dc2626" stroke-width="12"/>
            <circle cx="100" cy="100" r="80" fill="none" stroke="#f5d600" stroke-width="8"/>
            <text x="100" y="115" text-anchor="middle" font-size="52" font-weight="700" font-family="sans-serif" fill="#1a1d23">GCSW</text>
          </svg>
        </div>

        <div class="content-inner">
          <div class="page-title">Admin Dashboard</div>

          <div class="stats-grid">
            <div class="stat-card">
              <div class="label">Total Users</div>
              <div class="value" id="totalUsers">—</div>
              <div class="sub">All roles</div>
            </div>
            <div class="stat-card">
              <div class="label">Students</div>
              <div class="value" id="totalStudents">—</div>
              <div class="sub">Active accounts</div>
            </div>
            <div class="stat-card">
              <div class="label">Counselors</div>
              <div class="value" id="totalCounselors">—</div>
              <div class="sub">Active accounts</div>
            </div>
            <div class="stat-card alert">
              <div class="label">System Alerts</div>
              <div class="value" id="totalAlerts">—</div>
              <div class="sub">Needs review</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script type="module">
  import { auth } from '/static/firebase_config.js';
  import { signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

  auth.onAuthStateChanged(async user => {
    if (!user) { window.location.replace('/login'); return; }
    try {
      const token = await user.getIdToken();
      const res = await fetch('/api/stats', { headers: { 'Authorization': 'Bearer ' + token } });
      const data = await res.json();
      if (data.success) {
        document.getElementById('totalUsers').textContent      = data.total_users ?? '—';
        document.getElementById('totalStudents').textContent   = data.students ?? '—';
        document.getElementById('totalCounselors').textContent = data.counselors ?? '—';
        document.getElementById('totalAlerts').textContent     = data.alerts ?? '—';
      }
    } catch {}
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await signOut(auth);
    window.location.replace('/login');
  });

  document.querySelectorAll('.nav-item').forEach(item => {
    if (item.getAttribute('href') === window.location.pathname) item.classList.add('active');
  });
</script>
</body>
</html>
