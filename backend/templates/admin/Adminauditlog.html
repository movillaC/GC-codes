<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Audit Logs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #fff5f5; --surface: #ffffff; --border: #fecaca;
    --text-primary: #1a1d23; --text-secondary: #5a6075;
    --red: #dc2626; --red-hover: #b91c1c; --red-light: #fee2e2;
    --radius: 10px; --shadow: 0 1px 4px rgba(0,0,0,0.07);
    --sidebar-width: 240px;
  }
  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); }
  .layout { display: flex; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar-width); background: var(--red); display: flex; flex-direction: column; padding: 32px 0 24px; position: fixed; top: 0; left: 0; height: 100vh; z-index: 10; }
  .sidebar-logo { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 0 20px 28px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 16px; }
  .sidebar-logo span { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: 0.04em; }
  .sidebar-logo small { font-size: 12px; color: rgba(255,255,255,0.6); }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.85); text-decoration: none; transition: background 0.15s, color 0.15s; border-left: 3px solid transparent; }
  .nav-item:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .nav-item.active { background: rgba(255,255,255,0.2); color: #fff; border-left-color: #fff; }
  .nav-section-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.1em; padding: 16px 24px 6px; }
  .sidebar-bottom { margin-top: auto; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 8px; }
  .logout-btn { display: flex; align-items: center; font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.85); cursor: pointer; background: none; border: none; padding: 12px 24px; transition: color 0.15s, background 0.15s; width: 100%; font-family: 'DM Sans', sans-serif; border-left: 3px solid transparent; }
  .logout-btn:hover { color: #fff; background: rgba(255,255,255,0.15); }

  /* MAIN */
  .main { margin-left: var(--sidebar-width); flex: 1; padding: 32px; }
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .page-title { font-size: 22px; font-weight: 600; color: var(--text-primary); }
  .export-btn { background: var(--surface); color: var(--red); border: 1.5px solid var(--red); border-radius: var(--radius); padding: 10px 20px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .export-btn:hover { background: var(--red-light); }

  /* STATS ROW */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 22px; box-shadow: var(--shadow); }
  .stat-card .label { font-size: 12px; color: var(--text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .stat-card .value { font-size: 24px; font-weight: 600; color: var(--text-primary); }

  /* FILTERS */
  .toolbar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 10px 16px 10px 38px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; background: var(--surface); transition: border-color 0.15s; }
  .search-wrap input:focus { border-color: var(--red); }
  .search-wrap input::placeholder { color: #bbb; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: #bbb; fill: none; stroke-width: 2; stroke-linecap: round; }
  .filter-select { border: 1.5px solid var(--border); border-radius: var(--radius); padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--surface); color: var(--text-primary); outline: none; cursor: pointer; }
  .date-input { border: 1.5px solid var(--border); border-radius: var(--radius); padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--surface); color: var(--text-primary); outline: none; }

  /* LOG TABLE */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
  table { width: 100%; border-collapse: collapse; }
  th { background: var(--red-light); color: var(--red); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 12px 20px; text-align: left; white-space: nowrap; }
  td { padding: 13px 20px; font-size: 13px; color: var(--text-primary); border-top: 1px solid var(--border); vertical-align: middle; }
  tr:hover td { background: #fff8f8; }

  .severity { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
  .severity.info { background: #dbeafe; color: #1d4ed8; }
  .severity.warning { background: #fef3c7; color: #92400e; }
  .severity.critical { background: #fee2e2; color: #dc2626; }
  .severity.success { background: #dcfce7; color: #16a34a; }

  .timestamp { color: var(--text-secondary); font-size: 12px; white-space: nowrap; }
  .action-text { font-weight: 500; }
  .user-text { color: var(--text-secondary); font-size: 12px; }
  .ip-text { color: var(--text-secondary); font-size: 12px; font-family: monospace; }

  .pagination { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-top: 1px solid var(--border); font-size: 13px; color: var(--text-secondary); }
  .page-btns { display: flex; gap: 6px; }
  .page-btn { border: 1.5px solid var(--border); background: var(--surface); border-radius: 6px; padding: 5px 12px; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; color: var(--text-primary); transition: all 0.15s; }
  .page-btn:hover { border-color: var(--red); color: var(--red); }
  .page-btn.active { background: var(--red); color: #fff; border-color: var(--red); }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><span>GCSW</span><small>Admin Portal</small></div>
    <a class="nav-item" href="/dashboard">Dashboard</a>
    <div class="nav-section-label">Management</div>
    <a class="nav-item" href="/users">User Management</a>
    <a class="nav-item active" href="/audit-logs">Audit Logs</a>
    <a class="nav-item" href="/system-config">System Config</a>
    <a class="nav-item" href="/backup">Data Backup</a>
    <div class="sidebar-bottom">
      <a class="nav-item" href="/about">About Us</a>
      <a class="nav-item" href="/contacts">Contacts</a>
      <button class="logout-btn" id="logoutBtn">Log out</button>
    </div>
  </aside>

  <div class="main">
    <div class="page-header">
      <div class="page-title">Audit Logs</div>
      <button class="export-btn" onclick="exportCSV()">&#8595; Export CSV</button>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="label">Total Logs</div><div class="value" id="statTotal">—</div></div>
      <div class="stat-card"><div class="label">Today</div><div class="value" id="statToday">—</div></div>
      <div class="stat-card"><div class="label">Warnings</div><div class="value" id="statWarnings" style="color:#92400e">—</div></div>
      <div class="stat-card"><div class="label">Critical</div><div class="value" id="statCritical" style="color:var(--red)">—</div></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search actions or users..." oninput="filterLogs()" />
      </div>
      <select class="filter-select" id="severityFilter" onchange="filterLogs()">
        <option value="">All Severity</option>
        <option value="info">Info</option>
        <option value="success">Success</option>
        <option value="warning">Warning</option>
        <option value="critical">Critical</option>
      </select>
      <input type="date" class="date-input" id="dateFilter" onchange="filterLogs()" />
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>Severity</th>
            <th>Action</th>
            <th>User</th>
            <th>Target</th>
            <th>IP Address</th>
          </tr>
        </thead>
        <tbody id="logTable">
          <tr><td colspan="6" style="text-align:center;color:#bbb;padding:40px">Loading audit logs...</td></tr>
        </tbody>
      </table>
      <div class="pagination">
        <span id="paginationInfo">Showing 0 logs</span>
        <div class="page-btns">
          <button class="page-btn" onclick="changePage(-1)">&#8592; Prev</button>
          <button class="page-btn active" id="pageNum">1</button>
          <button class="page-btn" onclick="changePage(1)">Next &#8594;</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { auth } from '/static/firebase_config.js';
  import { signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

  let allLogs = [];
  let currentPage = 1;
  const perPage = 20;

  auth.onAuthStateChanged(async user => {
    if (!user) { window.location.replace('/login'); return; }
    const tokenResult = await user.getIdTokenResult();
    if (tokenResult.claims.role !== 'admin') { window.location.replace('/dashboard'); return; }
    const token = await user.getIdToken();
    loadLogs(token);
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    const { signOut } = await import("https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js");
    await signOut(auth);
    window.location.replace('/login');
  });

  async function loadLogs(token) {
    try {
      const res = await fetch('/api/audit-logs', { headers: { 'Authorization': 'Bearer ' + token } });
      const data = await res.json();
      if (data.success) {
        allLogs = data.logs;
        updateStats();
        renderLogs();
      }
    } catch { document.getElementById('logTable').innerHTML = '<tr><td colspan="6" style="text-align:center;color:#bbb;padding:40px">Failed to load logs.</td></tr>'; }
  }

  function updateStats() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('statTotal').textContent = allLogs.length;
    document.getElementById('statToday').textContent = allLogs.filter(l => l.timestamp?.startsWith(today)).length;
    document.getElementById('statWarnings').textContent = allLogs.filter(l => l.severity === 'warning').length;
    document.getElementById('statCritical').textContent = allLogs.filter(l => l.severity === 'critical').length;
  }

  window.filterLogs = function() { currentPage = 1; renderLogs(); };
  window.changePage = function(dir) {
    const maxPage = Math.ceil(getFiltered().length / perPage);
    currentPage = Math.max(1, Math.min(currentPage + dir, maxPage));
    renderLogs();
  };

  function getFiltered() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const severity = document.getElementById('severityFilter').value;
    const date = document.getElementById('dateFilter').value;
    return allLogs.filter(l =>
      (!search || l.action?.toLowerCase().includes(search) || l.user?.toLowerCase().includes(search)) &&
      (!severity || l.severity === severity) &&
      (!date || l.timestamp?.startsWith(date))
    );
  }

  function renderLogs() {
    const filtered = getFiltered();
    const start = (currentPage - 1) * perPage;
    const page = filtered.slice(start, start + perPage);
    document.getElementById('paginationInfo').textContent = `Showing ${filtered.length} log${filtered.length !== 1 ? 's' : ''}`;
    document.getElementById('pageNum').textContent = currentPage;
    if (page.length === 0) {
      document.getElementById('logTable').innerHTML = '<tr><td colspan="6" style="text-align:center;color:#bbb;padding:40px">No logs found.</td></tr>';
      return;
    }
    document.getElementById('logTable').innerHTML = page.map(l => `
      <tr>
        <td><span class="timestamp">${l.timestamp || '—'}</span></td>
        <td><span class="severity ${l.severity || 'info'}">${l.severity || 'info'}</span></td>
        <td><span class="action-text">${l.action || '—'}</span></td>
        <td><span class="user-text">${l.user || '—'}</span></td>
        <td><span class="user-text">${l.target || '—'}</span></td>
        <td><span class="ip-text">${l.ip || '—'}</span></td>
      </tr>`).join('');
  }

  window.exportCSV = function() {
    const headers = ['Timestamp','Severity','Action','User','Target','IP'];
    const rows = allLogs.map(l => [l.timestamp, l.severity, l.action, l.user, l.target, l.ip].map(v => `"${v || ''}"`).join(','));
    const csv = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `audit-logs-${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
  };
</script>
</body>
</html>
