<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>User Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #fff5f5; --surface: #ffffff; --border: #fecaca;
    --text-primary: #1a1d23; --text-secondary: #5a6075;
    --red: #dc2626; --red-hover: #b91c1c; --red-light: #fee2e2;
    --radius: 10px; --shadow: 0 1px 4px rgba(0,0,0,0.07);
    --sidebar-width: 240px;
  }
  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); }
  .layout { display: flex; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar { width: var(--sidebar-width); background: var(--red); display: flex; flex-direction: column; padding: 32px 0 24px; position: fixed; top: 0; left: 0; height: 100vh; z-index: 10; }
  .sidebar-logo { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 0 20px 28px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 16px; }
  .sidebar-logo span { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: 0.04em; }
  .sidebar-logo small { font-size: 12px; color: rgba(255,255,255,0.6); }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.85); text-decoration: none; transition: background 0.15s, color 0.15s; border-left: 3px solid transparent; }
  .nav-item:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .nav-item.active { background: rgba(255,255,255,0.2); color: #fff; border-left-color: #fff; }
  .nav-section-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.1em; padding: 16px 24px 6px; }
  .sidebar-bottom { margin-top: auto; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 8px; }
  .logout-btn { display: flex; align-items: center; font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.85); cursor: pointer; background: none; border: none; padding: 12px 24px; transition: color 0.15s, background 0.15s; width: 100%; font-family: 'DM Sans', sans-serif; border-left: 3px solid transparent; }
  .logout-btn:hover { color: #fff; background: rgba(255,255,255,0.15); }

  /* MAIN */
  .main { margin-left: var(--sidebar-width); flex: 1; padding: 32px; }
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .page-title { font-size: 22px; font-weight: 600; color: var(--text-primary); }

  /* TOOLBAR */
  .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap input { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 10px 16px 10px 38px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; background: var(--surface); color: var(--text-primary); transition: border-color 0.15s; }
  .search-wrap input:focus { border-color: var(--red); }
  .search-wrap input::placeholder { color: #bbb; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: #bbb; fill: none; stroke-width: 2; stroke-linecap: round; }
  .filter-select { border: 1.5px solid var(--border); border-radius: var(--radius); padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--surface); color: var(--text-primary); outline: none; cursor: pointer; }
  .filter-select:focus { border-color: var(--red); }
  .add-btn { background: var(--red); color: #fff; border: none; border-radius: var(--radius); padding: 10px 20px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  .add-btn:hover { background: var(--red-hover); }

  /* TABLE */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
  table { width: 100%; border-collapse: collapse; }
  th { background: var(--red-light); color: var(--red); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 12px 20px; text-align: left; white-space: nowrap; }
  td { padding: 14px 20px; font-size: 14px; color: var(--text-primary); border-top: 1px solid var(--border); vertical-align: middle; }
  tr:hover td { background: #fff8f8; }
  .user-cell { display: flex; align-items: center; gap: 10px; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--red-light); color: var(--red); font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .user-email { font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .badge.student { background: #dbeafe; color: #1d4ed8; }
  .badge.counselor { background: #ede9fe; color: #7c3aed; }
  .badge.admin { background: #fee2e2; color: #dc2626; }
  .badge.active { background: #dcfce7; color: #16a34a; }
  .badge.inactive { background: #f3f4f6; color: #6b7280; }
  .badge.banned { background: #fee2e2; color: #dc2626; }
  .actions { display: flex; gap: 6px; }
  .action-btn { border: none; border-radius: 6px; padding: 6px 12px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
  .action-btn.view { background: #dbeafe; color: #1d4ed8; }
  .action-btn.view:hover { background: #bfdbfe; }
  .action-btn.edit { background: #f3f4f6; color: var(--text-primary); }
  .action-btn.edit:hover { background: #e5e7eb; }
  .action-btn.ban { background: var(--red-light); color: var(--red); }
  .action-btn.ban:hover { background: #fca5a5; }
  .action-btn.delete { background: var(--red); color: #fff; }
  .action-btn.delete:hover { background: var(--red-hover); }

  /* PAGINATION */
  .pagination { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-top: 1px solid var(--border); font-size: 13px; color: var(--text-secondary); }
  .page-btns { display: flex; gap: 6px; }
  .page-btn { border: 1.5px solid var(--border); background: var(--surface); border-radius: 6px; padding: 5px 12px; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; color: var(--text-primary); transition: all 0.15s; }
  .page-btn:hover { border-color: var(--red); color: var(--red); }
  .page-btn.active { background: var(--red); color: #fff; border-color: var(--red); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 16px; padding: 32px; width: 100%; max-width: 440px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
  .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: var(--text-primary); }
  .modal-field { margin-bottom: 16px; }
  .modal-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; display: block; }
  .modal-input { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.15s; }
  .modal-input:focus { border-color: var(--red); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  .modal-cancel { background: #f3f4f6; color: var(--text-primary); border: none; border-radius: var(--radius); padding: 10px 20px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; }
  .modal-cancel:hover { background: #e5e7eb; }
  .modal-confirm { background: var(--red); color: #fff; border: none; border-radius: var(--radius); padding: 10px 20px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; }
  .modal-confirm:hover { background: var(--red-hover); }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><span>GCSW</span><small>Admin Portal</small></div>
    <a class="nav-item" href="/dashboard">Dashboard</a>
    <div class="nav-section-label">Management</div>
    <a class="nav-item active" href="/users">User Management</a>
    <a class="nav-item" href="/audit-logs">Audit Logs</a>
    <a class="nav-item" href="/system-config">System Config</a>
    <a class="nav-item" href="/backup">Data Backup</a>
    <div class="sidebar-bottom">
      <a class="nav-item" href="/about">About Us</a>
      <a class="nav-item" href="/contacts">Contacts</a>
      <button class="logout-btn" id="logoutBtn">Log out</button>
    </div>
  </aside>

  <div class="main">
    <div class="page-header">
      <div class="page-title">User Management</div>
      <button class="add-btn" onclick="openAddModal()">+ Add User</button>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search by email..." oninput="filterTable()" />
      </div>
      <select class="filter-select" id="roleFilter" onchange="filterTable()">
        <option value="">All Roles</option>
        <option value="student">Student</option>
        <option value="counselor">Counselor</option>
        <option value="admin">Admin</option>
      </select>
      <select class="filter-select" id="statusFilter" onchange="filterTable()">
        <option value="">All Status</option>
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
        <option value="banned">Banned</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Role</th>
            <th>Created</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="userTable">
          <tr><td colspan="5" style="text-align:center;color:#bbb;padding:40px">Loading users...</td></tr>
        </tbody>
      </table>
      <div class="pagination">
        <span id="paginationInfo">Showing 0 users</span>
        <div class="page-btns">
          <button class="page-btn" onclick="changePage(-1)">&#8592; Prev</button>
          <button class="page-btn active" id="pageNum">1</button>
          <button class="page-btn" onclick="changePage(1)">Next &#8594;</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ADD USER MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-title">Add New User</div>
    <div class="modal-field">
      <label class="modal-label">Email</label>
      <input class="modal-input" type="email" id="newEmail" placeholder="user@example.com" />
    </div>
    <div class="modal-field">
      <label class="modal-label">Role</label>
      <select class="modal-input" id="newRole">
        <option value="student">Student</option>
        <option value="counselor">Counselor</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="modal-field">
      <label class="modal-label">Temporary Password</label>
      <input class="modal-input" type="password" id="newPassword" placeholder="Min. 8 characters" />
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('addModal')">Cancel</button>
      <button class="modal-confirm" onclick="addUser()">Create User</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE MODAL -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal-title">Delete User</div>
    <p style="font-size:14px;color:var(--text-secondary);margin-bottom:8px">Are you sure you want to permanently delete <strong id="deleteTarget"></strong>? This action cannot be undone.</p>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('deleteModal')">Cancel</button>
      <button class="modal-confirm" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script type="module">
  import { auth } from '/static/firebase_config.js';
  import { signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

  let allUsers = [];
  let currentPage = 1;
  const perPage = 10;
  let deleteUID = null;

  auth.onAuthStateChanged(async user => {
    if (!user) { window.location.replace('/login'); return; }
    const token = await user.getIdTokenResult();
    if (token.claims.role !== 'admin') { window.location.replace('/dashboard'); return; }
    loadUsers(await user.getIdToken());
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await signOut(auth);
    window.location.replace('/login');
  });

  async function loadUsers(token) {
    try {
      const res = await fetch('/api/users/list', { headers: { 'Authorization': 'Bearer ' + token } });
      const data = await res.json();
      if (data.success) { allUsers = data.users; renderTable(); }
    } catch { renderEmpty('Failed to load users.'); }
  }

  window.filterTable = function() {
    currentPage = 1;
    renderTable();
  };

  window.changePage = function(dir) {
    const filtered = getFiltered();
    const maxPage = Math.ceil(filtered.length / perPage);
    currentPage = Math.max(1, Math.min(currentPage + dir, maxPage));
    renderTable();
  };

  function getFiltered() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const role = document.getElementById('roleFilter').value;
    const status = document.getElementById('statusFilter').value;
    return allUsers.filter(u =>
      (!search || u.email.toLowerCase().includes(search)) &&
      (!role || u.role === role) &&
      (!status || u.status === status)
    );
  }

  function renderTable() {
    const filtered = getFiltered();
    const start = (currentPage - 1) * perPage;
    const page = filtered.slice(start, start + perPage);
    const tbody = document.getElementById('userTable');
    document.getElementById('paginationInfo').textContent = `Showing ${filtered.length} user${filtered.length !== 1 ? 's' : ''}`;
    document.getElementById('pageNum').textContent = currentPage;

    if (page.length === 0) { renderEmpty('No users found.'); return; }

    tbody.innerHTML = page.map(u => `
      <tr>
        <td><div class="user-cell">
          <div class="avatar">${u.email[0].toUpperCase()}</div>
          <span class="user-email">${u.email}</span>
        </div></td>
        <td><span class="badge ${u.role}">${u.role}</span></td>
        <td style="color:var(--text-secondary)">${u.created || '—'}</td>
        <td><span class="badge ${u.status || 'active'}">${u.status || 'active'}</span></td>
        <td><div class="actions">
          <button class="action-btn view" onclick="viewUser('${u.uid}')">View</button>
          <button class="action-btn edit" onclick="editUser('${u.uid}')">Edit</button>
          <button class="action-btn ban" onclick="banUser('${u.uid}')">Ban</button>
          <button class="action-btn delete" onclick="openDeleteModal('${u.uid}','${u.email}')">Delete</button>
        </div></td>
      </tr>`).join('');
  }

  function renderEmpty(msg) {
    document.getElementById('userTable').innerHTML = `<tr><td colspan="5" style="text-align:center;color:#bbb;padding:40px">${msg}</td></tr>`;
  }

  window.openAddModal = () => document.getElementById('addModal').classList.add('open');
  window.closeModal = (id) => document.getElementById(id).classList.remove('open');

  window.openDeleteModal = (uid, email) => {
    deleteUID = uid;
    document.getElementById('deleteTarget').textContent = email;
    document.getElementById('deleteModal').classList.add('open');
  };

  window.addUser = async () => {
    const email = document.getElementById('newEmail').value.trim();
    const role = document.getElementById('newRole').value;
    const password = document.getElementById('newPassword').value;
    if (!email || !password) { alert('Please fill all fields.'); return; }
    const token = await auth.currentUser.getIdToken();
    const res = await fetch('/api/users/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ email, role, password })
    });
    const data = await res.json();
    if (data.success) { closeModal('addModal'); loadUsers(token); }
    else { alert(data.message || 'Failed to create user.'); }
  };

  window.confirmDelete = async () => {
    if (!deleteUID) return;
    const token = await auth.currentUser.getIdToken();
    const res = await fetch('/api/users/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ uid: deleteUID })
    });
    const data = await res.json();
    if (data.success) { closeModal('deleteModal'); loadUsers(token); }
    else { alert(data.message || 'Failed to delete user.'); }
  };

  window.banUser = async (uid) => {
    if (!confirm('Ban this user?')) return;
    const token = await auth.currentUser.getIdToken();
    await fetch('/api/users/ban', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ uid })
    });
    loadUsers(token);
  };

  
  
</script>
</body>
</html>
