<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contacts — Counselor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root { --bg: #f5f0ff; --surface: #ffffff; --border: #e2d9f3; --text-primary: #1a1d23; --text-secondary: #5a6075; --accent: #7c3aed; --radius: 10px; --shadow: 0 1px 4px rgba(0,0,0,0.07); --sidebar-width: 240px; }
  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); }
  .layout { display: flex; min-height: 100vh; }
  .sidebar { width: var(--sidebar-width); background: var(--accent); display: flex; flex-direction: column; padding: 32px 0 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 10; }
  .sidebar-logo { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 0 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 12px; flex-shrink: 0; }
  .sidebar-logo span { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: 0.04em; }
  .sidebar-logo small { font-size: 12px; color: rgba(255,255,255,0.6); }
  .sidebar-main { flex: 1; overflow: hidden; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 24px; font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.85); text-decoration: none; transition: background 0.15s, color 0.15s; border-left: 3px solid transparent; }
  .nav-item:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .nav-item.active { background: rgba(255,255,255,0.2); color: #fff; border-left-color: #fff; }
  .nav-section-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.1em; padding: 14px 24px 5px; }
  .sidebar-bottom { flex-shrink: 0; border-top: 1px solid rgba(255,255,255,0.2); padding: 8px 0 48px; }
  .logout-btn { display: flex; align-items: center; font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.85); cursor: pointer; background: none; border: none; padding: 11px 24px; transition: color 0.15s, background 0.15s; width: 100%; font-family: 'DM Sans', sans-serif; border-left: 3px solid transparent; }
  .logout-btn:hover { color: #fff; background: rgba(255,255,255,0.15); }
  .main { margin-left: var(--sidebar-width); flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 48px 36px; width: 100%; max-width: 700px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
  .watermark { position: absolute; top: -30px; right: -30px; opacity: 0.12; pointer-events: none; z-index: 0; }
  .watermark svg { width: 220px; height: 220px; }
  .card-content { position: relative; z-index: 1; }
  .card-header { display: flex; justify-content: flex-end; margin-bottom: 24px; }
  .go-back { font-size: 14px; color: var(--text-secondary); text-decoration: none; transition: color 0.15s; cursor: pointer; }
  .go-back:hover { color: var(--text-primary); }
  .section-title{font-size:20px;font-weight:600;color:var(--text-primary);margin-bottom:20px;}
  .contact-list{display:flex;flex-direction:column;gap:14px;}
  .contact-item{display:flex;align-items:center;gap:14px;border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 20px;}
  .contact-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .contact-icon svg{width:20px;height:20px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .contact-label{font-size:12px;color:var(--text-secondary);margin-bottom:3px;}
  .contact-value{font-size:15px;font-weight:500;color:var(--text-primary);}
  .contact-value a{color:var(--text-primary);text-decoration:none;}
  .contact-value a:hover{color:var(--accent);}
  .contact-icon { background: #ede9fe; }
  .contact-icon svg { stroke: #7c3aed; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><span>GCSW</span><small>Counselor Portal</small></div>
    <div class="sidebar-main">
      <a class="nav-item" href="/dashboard">Dashboard</a>
      <div class="nav-section-label">Management</div>
      <a class="nav-item" href="/students">Student Monitoring</a>
      <a class="nav-item" href="/requests">Counseling Requests</a>
      <a class="nav-item" href="/sessions">Active Sessions</a>
      <a class="nav-item" href="/case-notes">Case Notes</a>
      <a class="nav-item" href="/risk-alerts">Risk Alerts</a>
      <a class="nav-item" href="/resources">Resource Library</a>
    </div>
    <div class="sidebar-bottom">
      <a class="nav-item" href="/about">About Us</a>
      <a class="nav-item active" href="/contacts">Contacts</a>
      <button class="logout-btn" id="logoutBtn">Log out</button>
    </div>
  </aside>
  <div class="main">
    <div class="card">
      <div class="watermark"><svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="95" fill="none" stroke="#7c3aed" stroke-width="12"/><circle cx="100" cy="100" r="80" fill="none" stroke="#f5d600" stroke-width="8"/><text x="100" y="115" text-anchor="middle" font-size="52" font-weight="700" font-family="sans-serif" fill="#1a1d23">GCSW</text></svg></div>
      <div class="card-content">
        <div class="card-header"><a class="go-back" href="/dashboard">Go back &gt;</a></div>
        <div class="section-title">Contacts</div>
        <div class="contact-list">
          <div class="contact-item">
            <div class="contact-icon"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div>
            <div><div class="contact-label">Phone</div><div class="contact-value"><a href="tel:09303629426">09303629426</a></div></div>
          </div>
          <div class="contact-item">
            <div class="contact-icon"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
            <div><div class="contact-label">Email</div><div class="contact-value"><a href="mailto:202410634@gordoncollege.edu.ph">202410634@gordoncollege.edu.ph</a></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script type="module">

  document.querySelectorAll('.nav-item').forEach(item => {
    if (item.getAttribute('href') === window.location.pathname) item.classList.add('active');
  });
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try {
      const { auth } = await import('/static/firebase_config.js');
      const { signOut } = await import("https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js");
      await signOut(auth);
    } catch(e) {}
    window.location.replace('/login');
  });
</script>
</body>
</html>
