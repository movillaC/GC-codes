<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contacts</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>

  /* ── Admin-style layout overrides ── */
  :root {
    --bg: #f0f4f8; --surface: #fff; --border: #e2e5ea;
    --text-primary: #1a1d23; --text-secondary: #5a6075;
    --green: #2db84b; --green-dark: #1e9238; --green-light: #e8f5e9;
    --blue-bar: #2979ff; --radius: 8px; --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --sidebar-width: 220px;
  }
  /* Tighter sidebar */
  .sidebar { width: var(--sidebar-width); background: var(--blue-bar); display: flex; flex-direction: column; padding: 24px 0 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 10; }
  .sidebar-logo { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 0 16px 18px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 8px; flex-shrink: 0; }
  .sidebar-logo span { font-size: 13px; font-weight: 600; color: #fff; letter-spacing: 0.04em; }
  .sidebar-logo small { font-size: 11px; color: rgba(255,255,255,0.5); }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 18px; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85); text-decoration: none; transition: background 0.12s; border-left: 3px solid transparent; cursor: pointer; }
  .nav-item:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .nav-item.active { background: rgba(255,255,255,0.18); color: #fff; border-left-color: #fff; }
  .nav-section-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.1em; padding: 12px 18px 4px; }
  .quick-log-toggle { display: flex; align-items: center; justify-content: space-between; padding: 9px 18px; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85); cursor: pointer; border-left: 3px solid transparent; user-select: none; transition: background 0.12s; }
  .quick-log-toggle:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .quick-log-arrow { font-size: 10px; transition: transform 0.2s; }
  .quick-log-arrow.open { transform: rotate(180deg); }
  .quick-log-items { display: none; flex-direction: column; }
  .quick-log-items.open { display: flex; }
  .quick-log-items .nav-item { padding: 7px 18px 7px 30px; font-size: 12px; }
  .sidebar-bottom { flex-shrink: 0; margin-top: auto; border-top: 1px solid rgba(255,255,255,0.2); padding: 6px 0 28px; }
  .logout-btn { display: flex; align-items: center; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85); cursor: pointer; background: none; border: none; padding: 9px 18px; width: 100%; font-family: inherit; border-left: 3px solid transparent; transition: background 0.12s; }
  .logout-btn:hover { color: #fff; background: rgba(255,255,255,0.12); }
  /* Tighter main — full width, no center, no large card */
  .main { margin-left: var(--sidebar-width); flex: 1; padding: 16px 20px; }
  /* Replace large centred card with a flat panel */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px;
    box-shadow: var(--shadow); width: 100%; max-width: 680px;
    position: relative; overflow: hidden;
  }
  /* Remove excessive card padding & centring */
  .main.centred { display: flex; align-items: flex-start; justify-content: center; padding: 16px 20px; }
  /* Page header */
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .page-title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
  .page-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  /* Watermark smaller */
  .watermark { position: absolute; top: -20px; right: -20px; opacity: 0.08; pointer-events: none; }
  .watermark svg { width: 140px; height: 140px; }
  /* Panel (admin table wrapper style) */
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 10px; }
  .panel-header { padding: 7px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .panel-title { font-size: 12px; font-weight: 600; color: var(--text-primary); }
  .panel-sub { font-size: 11px; color: var(--text-secondary); }
  /* Toast */
  .toast { position: fixed; bottom: 18px; right: 18px; background: #18181b; color: #fff; padding: 9px 13px; border-radius: 6px; font-size: 12px; font-weight: 500; transform: translateY(6px); opacity: 0; transition: all 0.2s; pointer-events: none; z-index: 999; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-left: 3px solid var(--green); }
  :root { /* see shared vars above */ }
  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); }
  .layout { display: flex; min-height: 100vh; }
  /* sidebar css injected */
  /* main injected */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; width: 100%; max-width: 700px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
  .watermark { position: absolute; top: -30px; right: -30px; opacity: 0.15; pointer-events: none; z-index: 0; }
  .watermark svg { width: 220px; height: 220px; }
  .card-content { position: relative; z-index: 1; }
  .card-header { display: flex; justify-content: flex-end; margin-bottom: 28px; }
  .go-back { font-size: 14px; color: var(--text-secondary); text-decoration: none; transition: color 0.15s; cursor: pointer; }
  .go-back:hover { color: var(--text-primary); }
  .section-title { font-size: 20px; font-weight: 600; color: var(--text-primary); margin-bottom: 10px; }
  .contact-list { display: flex; flex-direction: column; gap: 14px; }
  .contact-item { display: flex; align-items: center; gap: 14px; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px 20px; }
  .contact-icon { width: 40px; height: 40px; border-radius: 50%; background: #eaf7ee; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .contact-icon svg { width: 20px; height: 20px; stroke: var(--green); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .contact-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 3px; }
  .contact-value { font-size: 15px; font-weight: 500; color: var(--text-primary); }
  .contact-value a { color: var(--text-primary); text-decoration: none; }
  .contact-value a:hover { color: var(--green); }
</style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
    <div class="sidebar-logo"><span>Student Portal</span><small>GCSW</small></div>
    <a class="nav-item" href="/dashboard">Dashboard</a>
    <a class="nav-item" href="/weekly-summary">Weekly Summary</a>
    <a class="nav-item" href="/resource-library">Resource Library</a>
    <a class="nav-item" href="/counseling">Counseling</a>
    <div class="nav-section-label">Features</div>
    <div class="quick-log-toggle" onclick="toggleQuickLog()">
      Quick Log <span class="quick-log-arrow" id="quickArrow">&#9660;</span>
    </div>
    <div class="quick-log-items" id="quickLogItems">
      <a class="nav-item" href="/mood-tracker">Log Mood</a>
      <a class="nav-item" href="/stress-note">Stress Note</a>
      <a class="nav-item" href="/water-intake">Water Intake</a>
      <a class="nav-item" href="/sleep-tracker">Sleep Tracker</a>
      <a class="nav-item" href="/ai-chat">AI Chat</a>
      <a class="nav-item" href="/activity-log">Activity Log</a>
      <a class="nav-item" href="/step-tracker">Steps Tracker</a>
    </div>
    <div class="sidebar-bottom">
      <a class="nav-item" href="/profile">My Profile</a>
      <a class="nav-item" href="/about">About Us</a>
      <a class="nav-item" href="/contacts">Contacts</a>
      <button class="logout-btn" id="logoutBtn">Log out</button>
    </div>
  </aside>

  <div class="main centred">
    <div class="card">
      <div class="watermark">
        <svg viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="95" fill="none" stroke="#2db84b" stroke-width="12"/>
          <circle cx="100" cy="100" r="80" fill="none" stroke="#f5d600" stroke-width="8"/>
          <text x="100" y="115" text-anchor="middle" font-size="52" font-weight="700">GCSW</text>
        </svg>
      </div>

      <div class="card-content">
        <div class="card-header"><a class="go-back" href="/dashboard">Go back &gt;</a></div>

        <div class="section-title">Contacts</div>

        <div class="contact-list">
          <div class="contact-item">
            <div class="contact-icon">
              <svg viewBox="0 0 24 24">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
              </svg>
            </div>
            <div>
              <div class="contact-label">Phone</div>
              <div class="contact-value"><a href="tel:09303629426">09303629426</a></div>
            </div>
          </div>

          <div class="contact-item">
            <div class="contact-icon">
              <svg viewBox="0 0 24 24">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </div>
            <div>
              <div class="contact-label">Email</div>
              <div class="contact-value"><a href="mailto:202410634@gordoncollege.edu.ph">202410634@gordoncollege.edu.ph</a></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script type="module">
  import { auth } from '/static/firebase_config.js';

  window.toggleQuickLog = function() {
    document.getElementById('quickLogItems').classList.toggle('open');
    document.getElementById('quickArrow').classList.toggle('open');
  };

  document.querySelectorAll('.nav-item').forEach(item => {
    if (item.getAttribute('href') === window.location.pathname) item.classList.add('active');
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try {
      const { auth } = await import('/static/firebase_config.js');
      const { signOut } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
      await signOut(auth);
    } catch(e) {}
    window.location.href = '/login';
  });
</script>

</body>
</html>
