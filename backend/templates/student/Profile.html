<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — GCSW</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
<style>

  /* ── Admin-style layout overrides ── */
  :root {
    --bg: #f0f4f8; --surface: #fff; --border: #e2e5ea;
    --text-primary: #1a1d23; --text-secondary: #5a6075;
    --green: #2db84b; --green-dark: #1e9238; --green-light: #e8f5e9;
    --blue-bar: #2979ff; --radius: 8px; --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --sidebar-width: 220px;
  }
  .sidebar { width: var(--sidebar-width); background: var(--blue-bar); display: flex; flex-direction: column; padding: 24px 0 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 10; }
  .sidebar-logo { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 0 16px 18px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 8px; flex-shrink: 0; }
  .sidebar-logo span { font-size: 13px; font-weight: 600; color: #fff; letter-spacing: 0.04em; }
  .sidebar-logo small { font-size: 11px; color: rgba(255,255,255,0.5); }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 18px; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85); text-decoration: none; transition: background 0.12s; border-left: 3px solid transparent; cursor: pointer; }
  .nav-item:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .nav-item.active { background: rgba(255,255,255,0.18); color: #fff; border-left-color: #fff; }
  .nav-section-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.1em; padding: 12px 18px 4px; }
  .quick-log-toggle { display: flex; align-items: center; justify-content: space-between; padding: 9px 18px; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85); cursor: pointer; border-left: 3px solid transparent; user-select: none; transition: background 0.12s; }
  .quick-log-toggle:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .quick-log-arrow { font-size: 10px; transition: transform 0.2s; }
  .quick-log-arrow.open { transform: rotate(180deg); }
  .quick-log-items { display: none; flex-direction: column; }
  .quick-log-items.open { display: flex; }
  .quick-log-items .nav-item { padding: 7px 18px 7px 30px; font-size: 12px; }
  .sidebar-bottom { flex-shrink: 0; margin-top: auto; border-top: 1px solid rgba(255,255,255,0.2); padding: 6px 0 28px; }
  .logout-btn { display: flex; align-items: center; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85); cursor: pointer; background: none; border: none; padding: 9px 18px; width: 100%; font-family: inherit; border-left: 3px solid transparent; transition: background 0.12s; }
  .logout-btn:hover { color: #fff; background: rgba(255,255,255,0.12); }
  .main { margin-left: var(--sidebar-width); flex: 1; padding: 16px 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; box-shadow: var(--shadow); width: 100%; max-width: 680px; position: relative; overflow: hidden; }
  .main.centred { display: flex; align-items: flex-start; justify-content: center; padding: 16px 20px; }
  .page-title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
  .page-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .watermark { position: absolute; top: -20px; right: -20px; opacity: 0.08; pointer-events: none; }
  .watermark svg { width: 140px; height: 140px; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 10px; }
  .panel-header { padding: 7px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .panel-title { font-size: 12px; font-weight: 600; color: var(--text-primary); }
  .panel-sub { font-size: 11px; color: var(--text-secondary); }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
  .layout { display: flex; min-height: 100vh; }

  .page-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 10px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .header-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green); margin-bottom: 6px; }
  .header-title { font-family: 'DM Serif Display', serif; font-size: 32px; line-height: 1.1; color: var(--text-primary); }

  .profile-hero { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 18px; display: flex; align-items: center; gap: 24px; margin-bottom: 10px; }
  .avatar { width: 72px; height: 72px; border-radius: 50%; background: var(--green-light); border: 2px solid var(--green-mid); display: flex; align-items: center; justify-content: center; font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--green-dark); flex-shrink: 0; user-select: none; }
  .hero-info { flex: 1; }
  .hero-name { font-size: 22px; font-weight: 600; color: var(--text-primary); margin-bottom: 3px; }
  .hero-email { font-size: 13px; color: var(--text-secondary); }
  .hero-meta { display: flex; gap: 16px; margin-top: 10px; flex-wrap: wrap; }
  .hero-badge { font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 20px; background: var(--green-light); color: var(--green-dark); border: 1px solid var(--green-mid); }
  .member-since { font-size: 12px; color: var(--text-tertiary); align-self: center; }

  .edit-btn { background: var(--green); color: #fff; border: none; border-radius: var(--radius); padding: 9px 18px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; flex-shrink: 0; }
  .edit-btn:hover { background: var(--green-dark); }
  .edit-btn.secondary { background: none; color: var(--text-secondary); border: 1.5px solid var(--border); }
  .edit-btn.secondary:hover { border-color: var(--text-secondary); color: var(--text-primary); }
  .btn-row { display: flex; gap: 8px; }

  .sections-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .section-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 16px; }
  .section-card.full { grid-column: 1 / -1; }
  .section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 10px; padding-bottom: 7px; border-bottom: 1px solid var(--border); }

  .field-list { display: flex; flex-direction: column; gap: 12px; }
  .field-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .field-label { font-size: 12px; color: var(--text-tertiary); font-weight: 500; min-width: 110px; flex-shrink: 0; }
  .field-value { font-size: 14px; color: var(--text-primary); font-weight: 500; text-align: right; }
  .field-empty { font-size: 13px; color: var(--text-tertiary); font-style: italic; }

  .field-input { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 9px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text-primary); outline: none; transition: border-color 0.15s; background: #fff; }
  .field-input:focus { border-color: var(--green); }
  .field-group { margin-bottom: 12px; }
  .field-group label { font-size: 12px; color: var(--text-tertiary); font-weight: 500; display: block; margin-bottom: 5px; }
  .two-col-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .pill-group { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .pill-opt { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1.5px solid var(--border); background: #fff; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; user-select: none; }
  .pill-opt:hover { border-color: var(--green-mid); }
  .pill-opt.selected { background: var(--green-light); border-color: var(--green-mid); color: var(--green-dark); }

  .goal-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .goal-tag { font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 20px; background: var(--green-light); color: var(--green-dark); border: 1px solid var(--green-mid); }
  .goal-tag.editable { cursor: pointer; transition: all 0.15s; background: #fff; color: var(--text-secondary); border-color: var(--border); }
  .goal-tag.editable.selected { background: var(--green-light); color: var(--green-dark); border-color: var(--green-mid); }

  .baseline-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .baseline-label { font-size: 12px; color: var(--text-tertiary); font-weight: 500; margin-bottom: 4px; }
  .baseline-value { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
  .baseline-bar { height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; }
  .baseline-fill { height: 100%; background: var(--green); border-radius: 2px; }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text-primary); color: #fff; padding: 12px 18px; border-radius: var(--radius); font-size: 13px; font-weight: 500; transform: translateY(20px); opacity: 0; transition: all 0.25s ease; pointer-events: none; z-index: 100; max-width: 320px; line-height: 1.5; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--green-dark); }
  .toast.error { background: #c62828; }

  .loading-state { display: flex; align-items: center; justify-content: center; padding: 60px; gap: 12px; flex-direction: column; }
  .loading-spinner { width: 28px; height: 28px; border: 2.5px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-state p { font-size: 13px; color: var(--text-secondary); }

  .view-mode {}
  .edit-mode { display: none; }
  .editing .view-mode { display: none; }
  .editing .edit-mode { display: block; }
</style>
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-logo"><span>Student Portal</span><small>GCSW</small></div>
    <a class="nav-item" href="/dashboard">Dashboard</a>
    <a class="nav-item" href="/weekly-summary">Weekly Summary</a>
    <a class="nav-item" href="/resource-library">Resource Library</a>
    <a class="nav-item" href="/counseling">Counseling</a>
    <div class="nav-section-label">Features</div>
    <div class="quick-log-toggle" onclick="toggleQuickLog()">
      Quick Log <span class="quick-log-arrow" id="quickArrow">&#9660;</span>
    </div>
    <div class="quick-log-items" id="quickLogItems">
      <a class="nav-item" href="/mood-tracker">Log Mood</a>
      <a class="nav-item" href="/stress-note">Stress Note</a>
      <a class="nav-item" href="/water-intake">Water Intake</a>
      <a class="nav-item" href="/sleep-tracker">Sleep Tracker</a>
      <a class="nav-item" href="/ai-chat">AI Chat</a>
      <a class="nav-item" href="/activity-log">Activity Log</a>
      <a class="nav-item" href="/step-tracker">Steps Tracker</a>
    </div>
    <div class="sidebar-bottom">
      <a class="nav-item" href="/profile">My Profile</a>
      <a class="nav-item" href="/about">About Us</a>
      <a class="nav-item" href="/contacts">Contacts</a>
      <button class="logout-btn" id="logoutBtn">Log out</button>
    </div>
  </aside>

  <div class="main" id="mainContent">
    <div class="loading-state">
      <div class="loading-spinner"></div>
      <p>Loading your profile...</p>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { auth } from '/static/firebase_config.js';
  import { signOut } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

  const GOALS_OPTIONS = ['Sleep better','Manage stress','Stay hydrated','Be more active','Improve mood','Eat healthier'];

  let profile = null;
  let token   = null;

  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = 'toast ' + type + ' show';
    setTimeout(() => el.classList.remove('show'), 3200);
  }

  function formatDob(dob) {
    if (!dob) return null;
    return new Date(dob).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
  }
  function calcAge(dob) {
    if (!dob) return null;
    return Math.floor((Date.now() - new Date(dob).getTime()) / (1000*60*60*24*365.25));
  }
  function formatJoined(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('en-US', { year:'numeric', month:'long' });
  }
  function initials(name) {
    if (!name) return '?';
    return name.trim().split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  }
  function stressLabel(val) {
    return {1:'Very low',2:'Low',3:'Moderate',4:'High',5:'Very high'}[val] || val;
  }

  function render(p) {
    const b         = p.baseline  || {};
    const reminders = p.reminders || {};
    const goals     = p.goals     || [];
    const age       = calcAge(p.dob);

    document.getElementById('mainContent').innerHTML = `
      <div class="page-header">
        <div>
          <div class="header-label">Account</div>
          <div class="header-title">My Profile</div>
        </div>
        <div class="btn-row" id="headerBtns">
          <button class="edit-btn" onclick="startEdit()">Edit profile</button>
        </div>
      </div>

      <div class="profile-hero">
        <div class="avatar">${initials(p.displayName)}</div>
        <div class="hero-info">
          <div class="hero-name">${p.displayName || '—'}</div>
          <div class="hero-email">${p.email || '—'}</div>
          <div class="hero-meta">
            ${p.sex    ? `<span class="hero-badge">${p.sex}</span>`         : ''}
            ${age      ? `<span class="hero-badge">${age} yrs</span>`       : ''}
            ${p.height ? `<span class="hero-badge">${p.height} cm</span>`   : ''}
            ${p.weight ? `<span class="hero-badge">${p.weight} kg</span>`   : ''}
            <span class="member-since">Member since ${formatJoined(p.createdAt)}</span>
          </div>
        </div>
      </div>

      <div class="sections-grid" id="sectionsGrid">

        <!-- Personal info -->
        <div class="section-card">
          <div class="section-title">Personal Information</div>
          <div class="view-mode field-list">
            <div class="field-row"><span class="field-label">Full name</span><span class="field-value">${p.displayName || '<span class="field-empty">Not set</span>'}</span></div>
            <div class="field-row"><span class="field-label">Date of birth</span><span class="field-value">${formatDob(p.dob) || '<span class="field-empty">Not set</span>'}</span></div>
            <div class="field-row"><span class="field-label">Sex</span><span class="field-value">${p.sex || '<span class="field-empty">Not set</span>'}</span></div>
            <div class="field-row"><span class="field-label">Height</span><span class="field-value">${p.height ? p.height+' cm' : '<span class="field-empty">Not set</span>'}</span></div>
            <div class="field-row"><span class="field-label">Weight</span><span class="field-value">${p.weight ? p.weight+' kg' : '<span class="field-empty">Not set</span>'}</span></div>
          </div>
          <div class="edit-mode">
            <div class="field-group"><label>Full name</label><input class="field-input" id="editName" type="text" value="${p.displayName||''}"></div>
            <div class="field-group"><label>Date of birth</label><input class="field-input" id="editDob" type="date" value="${p.dob||''}"></div>
            <div class="field-group">
              <label>Sex</label>
              <div class="pill-group" id="editSexGroup">
                ${['Female','Male','Non-binary','Prefer not to say'].map(s=>`<div class="pill-opt${p.sex===s?' selected':''}" data-val="${s}">${s}</div>`).join('')}
              </div>
            </div>
            <div class="two-col-inputs">
              <div class="field-group"><label>Height (cm)</label><input class="field-input" id="editHeight" type="number" value="${p.height||''}" min="100" max="250"></div>
              <div class="field-group"><label>Weight (kg)</label><input class="field-input" id="editWeight" type="number" value="${p.weight||''}" min="30" max="300"></div>
            </div>
          </div>
        </div>

        <!-- Health Baseline -->
        <div class="section-card">
          <div class="section-title">Health Baseline</div>
          <div class="view-mode baseline-grid">
            ${[
              { label:'Sleep',    val:b.sleep_hours    ? b.sleep_hours+' hrs/night'    : null, pct:b.sleep_hours    ? (b.sleep_hours/12)*100                                                       : 0 },
              { label:'Water',    val:b.water_glasses  ? b.water_glasses+' glasses/day': null, pct:b.water_glasses  ? (b.water_glasses/15)*100                                                     : 0 },
              { label:'Activity', val:b.activity_level || null,                                pct:{Sedentary:20,'Lightly active':45,'Moderately active':70,'Very active':100}[b.activity_level]||0 },
              { label:'Stress',   val:b.stress_level   ? stressLabel(b.stress_level)   : null, pct:b.stress_level   ? (b.stress_level/5)*100                                                       : 0 },
              { label:'Diet',     val:b.diet_quality   || null,                                pct:{Poor:20,Fair:45,Good:70,'Very good':100}[b.diet_quality]||0                                    },
            ].map(item=>`
              <div class="baseline-item">
                <div class="baseline-label">${item.label}</div>
                <div class="baseline-value">${item.val||'<span class="field-empty" style="font-size:12px">Not set</span>'}</div>
                ${item.val?`<div class="baseline-bar"><div class="baseline-fill" style="width:${item.pct}%"></div></div>`:''}
              </div>
            `).join('')}
          </div>
          <div class="edit-mode">
            <div class="field-group">
              <label>Sleep hours per night: <strong id="sleepLabel">${b.sleep_hours||7}h</strong></label>
              <input type="range" id="editSleep" min="3" max="12" step="0.5" value="${b.sleep_hours||7}" oninput="document.getElementById('sleepLabel').textContent=this.value+'h'" style="width:100%;accent-color:var(--green);margin-top:6px">
            </div>
            <div class="field-group">
              <label>Water glasses per day: <strong id="waterLabel">${b.water_glasses||6}</strong></label>
              <input type="range" id="editWater" min="1" max="15" step="1" value="${b.water_glasses||6}" oninput="document.getElementById('waterLabel').textContent=this.value" style="width:100%;accent-color:var(--green);margin-top:6px">
            </div>
            <div class="field-group">
              <label>Activity level</label>
              <div class="pill-group" id="editActivityGroup">
                ${['Sedentary','Lightly active','Moderately active','Very active'].map(a=>`<div class="pill-opt${b.activity_level===a?' selected':''}" data-val="${a}">${a}</div>`).join('')}
              </div>
            </div>
            <div class="field-group">
              <label>Diet quality</label>
              <div class="pill-group" id="editDietGroup">
                ${['Poor','Fair','Good','Very good'].map(d=>`<div class="pill-opt${b.diet_quality===d?' selected':''}" data-val="${d}">${d}</div>`).join('')}
              </div>
            </div>
          </div>
        </div>

        <!-- Goals -->
        <div class="section-card">
          <div class="section-title">Wellness Goals</div>
          <div class="view-mode goal-list">
            ${goals.length ? goals.map(g=>`<span class="goal-tag">${g}</span>`).join('') : '<span class="field-empty">No goals set</span>'}
          </div>
          <div class="edit-mode">
            <div style="font-size:12px;color:var(--text-tertiary);margin-bottom:10px;line-height:1.6">Select up to 3 goals.</div>
            <div class="goal-list" id="editGoalsGroup">
              ${GOALS_OPTIONS.map(g=>`<span class="goal-tag editable${goals.includes(g)?' selected':''}" data-val="${g}">${g}</span>`).join('')}
            </div>
            <div style="font-size:12px;color:#e53935;margin-top:6px;min-height:16px" id="goalsErr"></div>
          </div>
        </div>

        <!-- Reminders -->
        <div class="section-card" style="background:var(--bg);">
          <div class="section-title">Reminders &amp; Notifications</div>
          <div style="font-size:13px;color:var(--text-secondary);line-height:1.7">
            Push notification and email reminder settings have moved to the
            <a href="/dashboard" style="color:var(--green);font-weight:500;text-decoration:none">Dashboard</a>
            under <strong>Push Notification Settings</strong>.
          </div>
        </div>

        <!-- Suggestions panel -->
        <div class="section-card full" id="suggestCard" style="display:none">
          <div class="section-title">This Week's Personalised Suggestions</div>
          <div style="font-size:12px;color:var(--text-tertiary);margin-bottom:12px;line-height:1.6">
            Based on your health baseline and wellness goals vs your logged data this week.
          </div>
          <div id="profileStatsRow" style="display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px"></div>
          <table id="profileSuggestTable" style="width:100%;border-collapse:collapse">
            <tr><td style="padding:8px 0;font-size:12px;color:var(--text-secondary)">Loading suggestions…</td></tr>
          </table>
        </div>

      </div>

      <!-- AI Lifestyle Improvements -->
      <div class="section-card" id="aiLifestyleCard" style="margin-top:10px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);">
          <div>
            <div class="section-title" style="margin-bottom:2px;border:none;padding:0;">AI Lifestyle Improvements</div>
            <div style="font-size:11px;color:var(--text-secondary);">Personalised advice based on your baseline, goals, and this week's data</div>
          </div>
          <button onclick="loadAISuggestions()" id="aiRefreshBtn"
            style="font-size:11px;font-weight:500;padding:5px 12px;border-radius:6px;border:1.5px solid var(--border);background:#fff;color:var(--text-secondary);cursor:pointer;font-family:inherit;">
            Refresh
          </button>
        </div>
        <div id="aiSuggestionsBody" style="font-size:13px;color:var(--text-secondary);line-height:1.85;min-height:60px;">
          <div style="display:flex;align-items:center;gap:8px;font-size:12px;">
            <div style="width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0;"></div>
            Generating your personalised lifestyle advice&hellip;
          </div>
        </div>
      </div>
    `;

    wirePillGroup('editSexGroup');
    wirePillGroup('editActivityGroup');
    wirePillGroup('editDietGroup');

    document.querySelectorAll('#editGoalsGroup .goal-tag.editable').forEach(tag => {
      tag.addEventListener('click', () => {
        const sel = document.querySelectorAll('#editGoalsGroup .goal-tag.editable.selected');
        if (tag.classList.contains('selected')) {
          tag.classList.remove('selected');
          document.getElementById('goalsErr').textContent = '';
        } else {
          if (sel.length >= 3) { document.getElementById('goalsErr').textContent = 'Pick up to 3 goals.'; return; }
          tag.classList.add('selected');
          document.getElementById('goalsErr').textContent = '';
        }
      });
    });
  }

  function wirePillGroup(id) {
    const group = document.getElementById(id);
    if (!group) return;
    group.querySelectorAll('.pill-opt').forEach(opt => {
      opt.addEventListener('click', () => {
        group.querySelectorAll('.pill-opt').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
      });
    });
  }

  function getSelectedPill(id) {
    const group = document.getElementById(id);
    if (!group) return null;
    const el = group.querySelector('.pill-opt.selected');
    return el ? el.dataset.val : null;
  }

  window.startEdit = function() {
    document.getElementById('sectionsGrid').classList.add('editing');
    document.getElementById('headerBtns').innerHTML =
      '<button class="edit-btn secondary" onclick="cancelEdit()">Cancel</button>' +
      '<button class="edit-btn" onclick="saveEdit()">Save changes</button>';
  };

  window.cancelEdit = function() {
    document.getElementById('sectionsGrid').classList.remove('editing');
    document.getElementById('headerBtns').innerHTML =
      '<button class="edit-btn" onclick="startEdit()">Edit profile</button>';
  };

  window.saveEdit = async function() {
    const updates = {
      displayName: document.getElementById('editName').value.trim() || profile.displayName,
      dob:         document.getElementById('editDob').value || profile.dob,
      sex:         getSelectedPill('editSexGroup')      || profile.sex,
      height:      Number(document.getElementById('editHeight').value) || profile.height,
      weight:      Number(document.getElementById('editWeight').value) || profile.weight,
      baseline: {
        sleep_hours:    parseFloat(document.getElementById('editSleep').value),
        water_glasses:  parseInt(document.getElementById('editWater').value),
        activity_level: getSelectedPill('editActivityGroup') || (profile.baseline||{}).activity_level,
        diet_quality:   getSelectedPill('editDietGroup')     || (profile.baseline||{}).diet_quality,
        stress_level:   (profile.baseline||{}).stress_level  || null,
      },
      goals: [...document.querySelectorAll('#editGoalsGroup .goal-tag.editable.selected')].map(t=>t.dataset.val),
    };
    try {
      const res  = await fetch('/api/profile', { method:'PUT', headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'}, body:JSON.stringify(updates) });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);
      profile = {...profile, ...updates};
      render(profile);
      toast('Profile saved successfully.');
    } catch(e) { toast('Could not save: '+e.message, 'error'); }
  };

  const GEMINI_API_KEY = 'AIzaSyBrvm9YIq-H-G7C5SIviU9BsB8jj11_Lws';
  const GEMINI_MODEL   = 'gemini-2.5-flash';
  let _weeklyData = null;

  window.loadAISuggestions = async function() {
    const body = document.getElementById('aiSuggestionsBody');
    const btn  = document.getElementById('aiRefreshBtn');
    if (!body || !token || !profile) return;

    body.innerHTML = '<div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary);"><div style="width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0;"></div>Generating advice&hellip;</div>';
    if (btn) { btn.disabled = true; btn.textContent = 'Loading…'; }

    try {
      if (!_weeklyData) {
        const wr = await fetch('/api/summary/weekly', { headers: { Authorization: 'Bearer ' + token } });
        const wd = await wr.json();
        if (wd.success) _weeklyData = wd.summary;
      }

      const b     = profile.baseline || {};
      const goals = (profile.goals || []).join(', ') || 'not set';
      const name  = (profile.displayName || 'the student').split(' ')[0];

      const dataSummary = _weeklyData ? [
        'Sleep entries: '    + (_weeklyData.sleep    || []).length,
        'Mood entries: '     + (_weeklyData.mood     || []).length,
        'Water entries: '    + (_weeklyData.water    || []).length,
        'Stress entries: '   + (_weeklyData.stress   || []).length,
        'Activity entries: ' + (_weeklyData.activity || []).length,
        'Step entries: '     + (_weeklyData.steps    || []).length,
      ].join(', ') : 'No weekly data logged yet';

      const prompt =
        'You are a caring student wellness coach. Based on the student profile below, write 4 to 5 concise, ' +
        'practical, and encouraging lifestyle improvement suggestions. Each suggestion should be a short ' +
        'paragraph of 2 to 3 sentences. Address the student by first name. Be warm but specific — reference ' +
        'their actual baseline values and goals. Do not use bullet points or numbered lists; write in flowing ' +
        'prose with each suggestion separated by a blank line. Do not add a heading or preamble.\n\n' +
        'Student first name: ' + name + '\n' +
        'Wellness goals: ' + goals + '\n' +
        'Health baseline:\n' +
        '  Sleep: ' + (b.sleep_hours    || 'not set') + ' hrs/night\n' +
        '  Water: ' + (b.water_glasses  || 'not set') + ' glasses/day\n' +
        '  Activity level: ' + (b.activity_level || 'not set') + '\n' +
        '  Stress level: '   + (b.stress_level   || 'not set') + '/5\n' +
        '  Diet quality: '   + (b.diet_quality   || 'not set') + '\n' +
        'This week logging activity: ' + dataSummary;

      const endpoint =
        'https://generativelanguage.googleapis.com/v1beta/models/' +
        GEMINI_MODEL + ':streamGenerateContent?alt=sse&key=' + GEMINI_API_KEY;

      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ role: 'user', parts: [{ text: prompt }] }],
          generationConfig: { maxOutputTokens: 1024, temperature: 0.7 },
        }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error((err.error && err.error.message) || 'Gemini API error ' + response.status);
      }

      body.innerHTML = '';
      const reader  = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let text   = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (!raw || raw === '[DONE]') continue;
          try {
            const parsed = JSON.parse(raw);
            const delta  = parsed.candidates && parsed.candidates[0] && parsed.candidates[0].content && parsed.candidates[0].content.parts && parsed.candidates[0].content.parts[0] && parsed.candidates[0].content.parts[0].text || '';
            if (delta) {
              text += delta;
              body.innerHTML = text
                .split(/\n\n+/)
                .filter(p => p.trim())
                .map(p => '<p style="margin-bottom:12px;">' + p.replace(/\n/g, ' ').trim() + '</p>')
                .join('');
            }
          } catch(e) {}
        }
      }

      if (!text.trim()) body.innerHTML = '<p style="color:#c62828;">Could not generate suggestions. Try refreshing.</p>';

    } catch(err) {
      body.innerHTML = '<p style="color:#c62828;font-size:12px;">Error: ' + err.message + '</p>';
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = 'Refresh'; }
    }
  };

  auth.onAuthStateChanged(async user => {
    if (!user) { window.location.href = '/login'; return; }
    token = await user.getIdToken(true);
    try {
      const res  = await fetch('/api/profile', { headers:{'Authorization':'Bearer '+token} });
      const data = await res.json();
      if (!data.success) throw new Error(data.message);
      profile = data.profile;
      render(profile);
      loadAISuggestions();

      try {
        const sr = await fetch('/api/suggestions', { headers: { 'Authorization': 'Bearer ' + token } });
        const sd = await sr.json();
        if (sd.success) {
          const card = document.getElementById('suggestCard');
          if (card) card.style.display = 'block';
          const statsEl = document.getElementById('profileStatsRow');
          if (statsEl && sd.stats) {
            statsEl.innerHTML = Object.entries(sd.stats).map(function(entry) {
              const k = entry[0], v = entry[1];
              return '<div style="background:#fff;padding:10px 12px">' +
                '<div style="font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px">' + k + '</div>' +
                '<div style="font-size:15px;font-weight:600;color:var(--text-primary)">' + v + '</div>' +
                '</div>';
            }).join('');
          }
          const tbl = document.getElementById('profileSuggestTable');
          if (tbl && sd.suggestions && sd.suggestions.length) {
            tbl.innerHTML = sd.suggestions.map(function(t) {
              return '<tr style="border-bottom:1px solid var(--border)">' +
                '<td style="padding:9px 8px;font-size:12px;color:var(--text-secondary);line-height:1.55">' + t + '</td>' +
                '</tr>';
            }).join('');
          }
        }
      } catch(e) {}

    } catch(e) {
      document.getElementById('mainContent').innerHTML =
        '<div style="padding:40px;color:#c62828;font-size:13px">Could not load profile: ' + e.message + '</div>';
    }
  });

  window.toggleQuickLog = function() {
    document.getElementById('quickLogItems').classList.toggle('open');
    document.getElementById('quickArrow').classList.toggle('open');
  };

  document.getElementById('logoutBtn').addEventListener('click', async () => { await signOut(auth); window.location.href='/login'; });

  document.querySelectorAll('.nav-item[href]').forEach(el => { if (el.getAttribute('href') === window.location.pathname) el.classList.add('active'); });
</script>
</body>
</html>
