<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Weekly Summary</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>

  /* ── Admin-style layout overrides ── */
  :root {
    --bg: #f0f4f8; --surface: #fff; --border: #e2e5ea;
    --text-primary: #1a1d23; --text-secondary: #5a6075;
    --green: #2db84b; --green-dark: #1e9238; --green-light: #e8f5e9;
    --blue-bar: #2979ff; --radius: 8px; --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --sidebar-width: 220px;
  }
  /* Tighter sidebar */
  .sidebar { width: var(--sidebar-width); background: var(--blue-bar); display: flex; flex-direction: column; padding: 24px 0 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 10; }
  .sidebar-logo { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 0 16px 18px; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 8px; flex-shrink: 0; }
  .sidebar-logo span { font-size: 13px; font-weight: 600; color: #fff; letter-spacing: 0.04em; }
  .sidebar-logo small { font-size: 11px; color: rgba(255,255,255,0.5); }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 18px; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85); text-decoration: none; transition: background 0.12s; border-left: 3px solid transparent; cursor: pointer; }
  .nav-item:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .nav-item.active { background: rgba(255,255,255,0.18); color: #fff; border-left-color: #fff; }
  .nav-section-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.1em; padding: 12px 18px 4px; }
  .quick-log-toggle { display: flex; align-items: center; justify-content: space-between; padding: 9px 18px; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85); cursor: pointer; border-left: 3px solid transparent; user-select: none; transition: background 0.12s; }
  .quick-log-toggle:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .quick-log-arrow { font-size: 10px; transition: transform 0.2s; }
  .quick-log-arrow.open { transform: rotate(180deg); }
  .quick-log-items { display: none; flex-direction: column; }
  .quick-log-items.open { display: flex; }
  .quick-log-items .nav-item { padding: 7px 18px 7px 30px; font-size: 12px; }
  .sidebar-bottom { flex-shrink: 0; margin-top: auto; border-top: 1px solid rgba(255,255,255,0.2); padding: 6px 0 28px; }
  .logout-btn { display: flex; align-items: center; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85); cursor: pointer; background: none; border: none; padding: 9px 18px; width: 100%; font-family: inherit; border-left: 3px solid transparent; transition: background 0.12s; }
  .logout-btn:hover { color: #fff; background: rgba(255,255,255,0.12); }
  /* Tighter main — full width, no center, no large card */
  .main { margin-left: var(--sidebar-width); flex: 1; padding: 16px 20px; }
  /* Replace large centred card with a flat panel */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px;
    box-shadow: var(--shadow); width: 100%; max-width: 680px;
    position: relative; overflow: hidden;
  }
  /* Remove excessive card padding & centring */
  .main.centred { display: flex; align-items: flex-start; justify-content: center; padding: 16px 20px; }
  /* Page header */
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .page-title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
  .page-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  /* Watermark smaller */
  .watermark { position: absolute; top: -20px; right: -20px; opacity: 0.08; pointer-events: none; }
  .watermark svg { width: 140px; height: 140px; }
  /* Panel (admin table wrapper style) */
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 10px; }
  .panel-header { padding: 7px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .panel-title { font-size: 12px; font-weight: 600; color: var(--text-primary); }
  .panel-sub { font-size: 11px; color: var(--text-secondary); }
  /* Toast */
  .toast { position: fixed; bottom: 18px; right: 18px; background: #18181b; color: #fff; padding: 9px 13px; border-radius: 6px; font-size: 12px; font-weight: 500; transform: translateY(6px); opacity: 0; transition: all 0.2s; pointer-events: none; z-index: 999; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-left: 3px solid var(--green); }
  :root { /* see shared vars above */ }
  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); }
  .layout { display: flex; min-height: 100vh; }
  /* sidebar css injected */
  /* main injected */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; width: 100%; max-width: 780px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
  .watermark { position: absolute; top: -30px; right: -30px; opacity: 0.15; pointer-events: none; z-index: 0; }
  .watermark svg { width: 220px; height: 220px; }
  .card-content { position: relative; z-index: 1; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .go-back { font-size: 14px; color: var(--text-secondary); text-decoration: none; transition: color 0.15s; cursor: pointer; }
  .go-back:hover { color: var(--text-primary); }
  .page-title { font-size: 22px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
  .date-range { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }
  .summary-list { display: flex; flex-direction: column; gap: 10px; }
  .summary-row { display: grid; grid-template-columns: 1.4fr 1.4fr 1fr; align-items: center; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 8px 12px; min-height: 44px; background: var(--surface); }
  .row-day { font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .row-stats { font-size: 13px; color: var(--text-secondary); line-height: 1.8; }
  .row-notes { font-size: 13px; color: var(--text-secondary); line-height: 1.8; text-align: right; }
  .placeholder { color: #ccc; font-style: italic; font-size: 12px; }
  .loading { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 14px; }
  .error-msg { text-align: center; padding: 20px; color: #e53935; font-size: 13px; background: #fff5f5; border: 1px solid #fcc; border-radius: var(--radius); }

  .suggestions-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; margin-top: 20px; }
  .suggestions-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
  .suggestions-based { font-size: 11px; color: var(--text-secondary); font-style: italic; }
  .suggestion-item { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: var(--text-secondary); line-height: 1.6; background: #fafafa; border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; margin-bottom: 8px; }
  .suggestion-item:last-child { margin-bottom: 0; }
  .suggestion-icon { font-size: 16px; flex-shrink: 0; }
  .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; }
  .stats-mini { background: #fafafa; border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  .stats-mini-label { font-size: 11px; color: var(--text-secondary); font-weight: 500; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .stats-mini-value { font-size: 16px; font-weight: 600; color: var(--text-primary); }
</style>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
    <div class="sidebar-logo"><span>Student Portal</span><small>GCSW</small></div>
    <a class="nav-item" href="/dashboard">Dashboard</a>
    <a class="nav-item" href="/weekly-summary">Weekly Summary</a>
    <a class="nav-item" href="/resource-library">Resource Library</a>
    <a class="nav-item" href="/counseling">Counseling</a>
    <div class="nav-section-label">Features</div>
    <div class="quick-log-toggle" onclick="toggleQuickLog()">
      Quick Log <span class="quick-log-arrow" id="quickArrow">&#9660;</span>
    </div>
    <div class="quick-log-items" id="quickLogItems">
      <a class="nav-item" href="/mood-tracker">Log Mood</a>
      <a class="nav-item" href="/stress-note">Stress Note</a>
      <a class="nav-item" href="/water-intake">Water Intake</a>
      <a class="nav-item" href="/sleep-tracker">Sleep Tracker</a>
      <a class="nav-item" href="/ai-chat">AI Chat</a>
      <a class="nav-item" href="/activity-log">Activity Log</a>
      <a class="nav-item" href="/step-tracker">Steps Tracker</a>
    </div>
    <div class="sidebar-bottom">
      <a class="nav-item" href="/profile">My Profile</a>
      <a class="nav-item" href="/about">About Us</a>
      <a class="nav-item" href="/contacts">Contacts</a>
      <button class="logout-btn" id="logoutBtn">Log out</button>
    </div>
  </aside>
  <div class="main">
    <div class="card">
      <div class="watermark"><svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="95" fill="none" stroke="#2db84b" stroke-width="12"/><circle cx="100" cy="100" r="80" fill="none" stroke="#f5d600" stroke-width="8"/><text x="100" y="115" text-anchor="middle" font-size="52" font-weight="700" font-family="sans-serif" fill="#1a1d23">GCSW</text></svg></div>
      <div class="card-content">
        <div class="card-header">
          <div>
            <div class="page-title">Weekly Summary</div>
            <div class="date-range" id="dateRange">Loading...</div>
          </div>
          <a class="go-back" href="/dashboard">Go back &gt;</a>
        </div>
        <div class="summary-list" id="summaryList"><div class="loading">Loading your week...</div></div>
      </div>
    </div>
  </div>
</div>
<script type="module">
  import { auth } from '/static/firebase_config.js';

  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function getWeekDates() {
    const today = new Date();
    const monday = new Date(today);
    monday.setDate(today.getDate() - ((today.getDay() + 6) % 7));
    return Array.from({length: 7}, (_, i) => { const d = new Date(monday); d.setDate(monday.getDate() + i); return d; });
  }

  function formatDate(d) { return days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate(); }

  const dates = getWeekDates();
  const first = dates[0], last = dates[6];
  document.getElementById('dateRange').textContent = months[first.getMonth()] + ' ' + first.getDate() + ' – ' + last.getDate() + ', ' + last.getFullYear();

  const list = document.getElementById('summaryList');

  function renderPlaceholders() {
    list.innerHTML = '';
    dates.forEach(d => {
      const row = document.createElement('div');
      row.className = 'summary-row';
      row.innerHTML = '<div class="row-day">' + formatDate(d) + '</div><div class="row-stats placeholder">— no data —</div><div class="row-notes placeholder">—</div>';
      list.appendChild(row);
    });
  }

  // ── FIXED renderData ──────────────────────────────────────────────────────
  function renderData(summary) {
    list.innerHTML = '';

    // Normalize any date string/object to YYYY-MM-DD
    function toDateStr(logged_at) {
      if (!logged_at) return '';
      return new Date(logged_at).toISOString().split('T')[0];
    }

    // Return the single latest entry for a given day, or null if none
    function latest(arr, ds) {
      const filtered = (arr || []).filter(r => toDateStr(r.logged_at) === ds);
      if (!filtered.length) return null;
      // Sort descending by logged_at so index 0 is the newest
      return filtered.sort((a, b) => new Date(b.logged_at) - new Date(a.logged_at))[0];
    }

    dates.forEach(d => {
      const ds = d.toISOString().split('T')[0]; // e.g. "2026-05-05"

      // Latest entry wins for sleep, mood, stress
      const sleep  = latest(summary.sleep,  ds);
      const mood   = latest(summary.mood,   ds);
      const stress = latest(summary.stress, ds);

      // Water: accumulate ALL entries for the day
      const waterEntries = (summary.water || []).filter(r => toDateStr(r.logged_at) === ds);
      const tw = waterEntries.reduce((s, r) => s + (r.amount_ml || 0), 0) / 1000;

      const row = document.createElement('div');
      row.className = 'summary-row';
      row.innerHTML =
        '<div class="row-day">'   + formatDate(d) + '</div>' +
        '<div class="row-stats">' + (sleep  ? sleep.total + ' sleep' : '—') + '<br>' +
                                    (tw > 0 ? tw.toFixed(1) + ' L water' : '—') + '</div>' +
        '<div class="row-notes">' + (stress ? stress.stressor : 'No note') + '<br>' +
                                    (mood   ? mood.mood : '—') + '</div>';
      list.appendChild(row);
    });
  }
  // ── END FIXED renderData ──────────────────────────────────────────────────

  // Wait for auth state, then fetch data
  auth.onAuthStateChanged(async user => {
    if (!user) { window.location.href = '/login'; return; }
    try {
      const token = await user.getIdToken(true); // force refresh token
      const res = await fetch('/api/summary/weekly', { headers: { 'Authorization': 'Bearer ' + token } });
      if (!res.ok) { console.error('API error:', res.status); renderPlaceholders(); return; }
      const data = await res.json();
      if (data.success) renderData(data.summary);
      else renderPlaceholders();

    // Load personalised suggestions from profile + weekly data
    try {
      const sRes  = await fetch('/api/suggestions', { headers: { 'Authorization': 'Bearer ' + token } });
      const sData = await sRes.json();
      if (sData.success) {
        // Stats row
        const statsEl = document.getElementById('statsRow');
        if (statsEl && sData.stats) {
          statsEl.style.display = 'grid';
          statsEl.innerHTML = Object.entries(sData.stats).map(([k,v]) =>
            `<div class="stats-mini"><div class="stats-mini-label">${k}</div><div class="stats-mini-value">${v}</div></div>`
          ).join('');
        }
        // Suggestions
        const panel = document.getElementById('suggestionsPanel');
        const items = document.getElementById('suggestionItems');
        if (panel && items && sData.suggestions && sData.suggestions.length) {
          panel.style.display = 'block';
          items.innerHTML = sData.suggestions.map(t =>
            `<div class="suggestion-item"><span class="suggestion-icon">💡</span><span>${t}</span></div>`
          ).join('');
        }
      }
    } catch(e) { console.error('Suggestions failed', e); }
    } catch(e) {
      console.error('Fetch error:', e);
      list.innerHTML = '<div class="error-msg">Could not load summary. Check console for details.</div>';
    }
  });

  window.toggleQuickLog = function() {
    document.getElementById('quickLogItems').classList.toggle('open');
    document.getElementById('quickArrow').classList.toggle('open');
  };
  document.querySelectorAll('.nav-item').forEach(item => {
    if (item.getAttribute('href') === window.location.pathname) item.classList.add('active');
  });
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    try {
      const { auth } = await import('/static/firebase_config.js');
      const { signOut } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
      await signOut(auth);
    } catch(e) {}
    window.location.href = '/login';
  });
</script>
</body>
</html>
