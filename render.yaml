services:
  - type: web
    name: gcsw-student-server
    env: python
    plan: free
    runtime: python-3.11
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/student_server.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SECRET_KEY
        sync: false   # Set this manually in the Render dashboard
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false   # Set this manually in the Render dashboard

  - type: web
    name: gcsw-admin-server
    env: python
    plan: free
    runtime: python-3.11
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/admin_server.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SECRET_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false

  - type: web
    name: gcsw-consultant-server
    env: python
    plan: free
    runtime: python-3.11
    buildCommand: pip install -r requirements.txt
    startCommand: python backend/consultant_server.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SECRET_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false